<html><body><h1>What to Know About Type 2 Diabetes</h1>
<div class="article__body">
<p>Type 2 diabetes is a condition in which the body does not use insulin properly, leading to high blood sugar levels over time.</p>
<p>Lifestyle changes such as a healthy diet, regular exercise, and weight management can help control blood sugar.</p>
</div></body></html>
