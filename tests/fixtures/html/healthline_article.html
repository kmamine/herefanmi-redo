<html><body><h1>The Health Benefits of a Mediterranean Diet</h1>
<article>
<p>The Mediterranean diet emphasizes fruits, vegetables, whole grains, legumes, and olive oil, with moderate amounts of fish and poultry.</p>
<p>Research links this eating pattern to a reduced risk of heart disease, stroke, and type 2 diabetes.</p>
