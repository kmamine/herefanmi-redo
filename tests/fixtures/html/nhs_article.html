<html><body><h1>Vitamin D and Bone Health</h1>
<article>
<p>Vitamin D helps regulate the amount of calcium and phosphate in the body, nutrients needed to keep bones, teeth and muscles healthy.</p>
<p>Adults need 10 micrograms of vitamin D a day, and a supplement is advised during autumn and winter.</p>
